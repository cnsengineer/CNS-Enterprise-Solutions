<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNS : Report Builder (Ultimate)</title>
<meta name="theme-color" content="#0046be">
<script>
  if(localStorage.getItem('cns_report_theme')==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
  }
</script>
<!-- CSS & Fonts -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Drag&Drop and PDF -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --accent:#0046be;--accent-h:#003399;--accent-glow:rgba(0,70,190,.18);
  --bg:#f3f6fc;--bg2:#ffffff;--bg3:#f8fafc;--bg4:#e2e8f0;--bg5:#cbd5e1;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --success:#10b981;--danger:#ef4444;--warn:#f59e0b;--info:#0ea5e9;
  --workspace:#dde3ef;
  --brand-h:52px;--status-h:28px;--radius:10px;
}
[data-theme="dark"]{
  --accent:#3b82f6;--accent-h:#60a5fa;--accent-glow:rgba(59,130,246,.25);
  --bg:#0f172a;--bg2:#1e293b;--bg3:#1e293b;--bg4:#334155;--bg5:#475569;
  --border:#334155;--border2:#475569;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --workspace:#0b1120;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* BRAND HEADER */
#brandbar{height:var(--brand-h);background:var(--bg2);border-bottom:2px solid var(--border);display:flex;align-items:center;padding:0 16px 0 14px;box-shadow:0 2px 12px rgba(0,0,0,.05);position:relative;z-index:300;flex-shrink:0}
#brand-left{display:flex;align-items:center;gap:11px;cursor:pointer;flex:1;min-width:0}
.brand-logo{height:34px;width:auto;object-fit:contain;flex-shrink:0;transition:transform .25s}
.brand-logo:hover{transform:scale(1.06)}
.brand-logo-fallback{display:none;width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-h));color:#fff;font-weight:800;font-size:13px;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px var(--accent-glow);}
.brand-title{font-size:1.05rem;font-weight:800;color:var(--accent);line-height:1.1;white-space:nowrap}
.brand-sub{font-size:.72rem;color:var(--text3);font-weight:500;margin-top:1px}
#brand-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ctrl-btn{background:var(--bg3);border:1.5px solid var(--border);padding:6px 15px;border-radius:30px;font-size:.82rem;font-weight:700;font-family:'Sarabun',sans-serif;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .18s;box-shadow:0 2px 8px rgba(0,0,0,.04);white-space:nowrap}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px var(--accent-glow)}
.ctrl-btn i{font-size:.88rem}

/* MAIN LAYOUT */
main{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - var(--brand-h) - var(--status-h))}
.panel-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-right{display:flex;flex-direction:column;overflow:hidden;background:var(--workspace)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.panel-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);display:flex;align-items:center;gap:7px}
.panel-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);display:block;flex-shrink:0}
.panel-label.green::before{background:var(--success)}
.panel-actions{display:flex;gap:6px;align-items:center}

/* BUTTONS */
.btn-sm{padding:6px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.btn-sm.danger:hover{border-color:var(--danger);color:var(--danger);background:rgba(239,68,68,.05)}
.btn-sm.success{border-color:var(--success);color:var(--success);background:rgba(16,185,129,.07)}
.btn-sm.success:hover{background:rgba(16,185,129,.14)}
.btn-sm.pdf-btn{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.05)}
.btn-sm.pdf-btn:hover{background:rgba(239,68,68,.15); transform:translateY(-1px); box-shadow:0 4px 10px rgba(239,68,68,.2);}
.btn-sm:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* LEFT BUILDER */
.builder-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
.meta-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.02)}
.meta-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.meta-title i{color:var(--accent)}
.field-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field-row.inline{flex-direction:row;align-items:center;gap:10px}
.field-row:last-child{margin-bottom:0}
.field-lbl{font-size:12px;font-weight:700;color:var(--text3)}
.field-inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px;outline:none;font-family:'Sarabun',sans-serif;width:100%;transition:border-color .15s, box-shadow .15s}
.field-inp:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow)}
textarea.field-inp{resize:vertical;line-height:1.7}
select.field-inp{height:36px;cursor:pointer}
select.field-inp option{background:var(--bg2)}

/* RICH TEXT */
.rt-toolbar{display:flex;gap:4px;background:var(--bg4);padding:4px;border-radius:6px 6px 0 0;border:1.5px solid var(--border);border-bottom:none}
.rt-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:4px;width:28px;height:28px;display:grid;place-items:center;cursor:pointer;font-size:12px;transition:all .1s}
.rt-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.rt-editor{border-radius:0 0 6px 6px;min-height:90px;resize:vertical;overflow-y:auto;background:var(--bg2); line-height: 1.6;}
.rt-editor:empty:before{content:attr(data-placeholder);color:var(--text3);pointer-events:none;display:block}

/* SECTION LIST */
.section-list{display:flex;flex-direction:column;gap:8px}
.section-empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:14px;line-height:1.9;background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--radius);}
.section-empty i{font-size:36px;opacity:.3;display:block;margin-bottom:12px}
.section-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s,box-shadow .15s; box-shadow:0 2px 6px rgba(0,0,0,.02)}
.section-item.active{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.section-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;user-select:none; background:var(--bg2)}
.section-head:hover{background:var(--bg3)}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;padding:4px;}
.drag-handle:active{cursor:grabbing}
.section-ico{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;font-size:13px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-h))}
.section-ico.g{background:linear-gradient(135deg,#10b981,#059669)}
.section-ico.o{background:linear-gradient(135deg,#f59e0b,#d97706)}
.section-ico.p{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.section-ico.r{background:linear-gradient(135deg,#ef4444,#dc2626)}
.section-ico.s{background:linear-gradient(135deg,#94a3b8,#64748b)}
.section-ico.i{background:linear-gradient(135deg,#0ea5e9,#0284c7)}
.section-name{flex:1;font-size:14px;font-weight:700;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section-badge{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0; background:var(--bg4); padding:2px 8px; border-radius:12px;}
.section-ctrls{display:flex;gap:4px;flex-shrink:0}
.ic-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:grid;place-items:center;font-size:12px;transition:background .12s,color .12s}
.ic-btn:hover{background:var(--bg4);color:var(--text)}
.ic-btn.del:hover{background:rgba(239,68,68,.1);color:var(--danger)}
.ic-btn.add:hover{background:rgba(16,185,129,.1);color:var(--success)}
.section-editor{border-top:1px solid var(--border);padding:16px;display:none;background:var(--bg3)}
.section-editor.show{display:block}
.sortable-ghost{opacity:0.4; background:var(--bg4); border:1px dashed var(--accent);}

/* ADD TOOLBAR */
.add-toolbar{padding:16px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;box-shadow:0 -4px 10px rgba(0,0,0,.02)}
.add-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px}
.add-btns{display:flex;gap:6px;flex-wrap:wrap}
.add-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);transform:translateY(-1px)}
.add-btn i{font-size:11px}

/* PREVIEW */
.preview-scroll{flex:1;overflow-y:auto;padding:30px 20px;background:var(--workspace); display:flex; justify-content:center;}
.report-paper{
  background:var(--bg2);
  border-radius:4px;
  box-shadow:0 10px 40px rgba(0,0,0,.15);
  padding:50px 40px;
  border:1px solid var(--border);
  position:relative;
  width: 100%;
  max-width: 21cm; /* A4 Width Simulation */
  min-height: 29.7cm; /* A4 Height Simulation */
  flex-shrink: 0;
}
.report-paper-header{border-bottom:3px solid var(--accent);padding-bottom:20px;margin-bottom:30px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.rph-title{font-size:24px;font-weight:800;color:var(--text);line-height:1.2}
.rph-sub{font-size:15px;color:var(--text2);margin-top:6px;font-weight:500}
.rph-meta{text-align:right;font-size:13px;color:var(--text3);line-height:1.9;flex-shrink:0}

/* PREVIEW ELEMENTS */
.prev-sec{margin-bottom:24px; page-break-inside: avoid;}
.prev-h1{font-size:20px;font-weight:800;color:var(--accent);padding-bottom:8px;border-bottom:2px solid var(--border);line-height:1.3;margin-top:10px;}
.prev-h2{font-size:16px;font-weight:700;color:var(--text);padding-bottom:6px;border-bottom:1px solid var(--border);margin-top:10px;}
.prev-h3{font-size:14px;font-weight:700;color:var(--text2)}
.prev-txt{font-size:14px;line-height:1.8;color:var(--text);word-break:break-word}
.prev-hr{border:none;border-top:1.5px solid var(--border);margin:8px 0}
.prev-img-wrap{text-align:center;margin:16px 0}
.prev-img{max-width:100%;height:auto;border-radius:6px;border:1px solid var(--border)}
.prev-img-cap{font-size:12px;color:var(--text3);margin-top:8px;font-style:italic}
.prev-list{font-size:14px;line-height:1.8;color:var(--text);padding-left:24px}
.prev-list li{margin-bottom:6px}
.prev-callout{padding:14px 18px;border-radius:6px;font-size:14px;line-height:1.6;display:flex;gap:14px;align-items:flex-start}
.prev-callout i{font-size:18px;margin-top:2px}
.prev-callout.info{background:rgba(14,165,233,.1);color:#0369a1;border:1px solid rgba(14,165,233,.2)}
.prev-callout.success{background:rgba(16,185,129,.1);color:#047857;border:1px solid rgba(16,185,129,.2)}
.prev-callout.warning{background:rgba(245,158,11,.1);color:#b45309;border:1px solid rgba(245,158,11,.2)}
.prev-callout.danger{background:rgba(239,68,68,.1);color:#b91c1c;border:1px solid rgba(239,68,68,.2)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.metric-card{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:16px 12px;text-align:center}
.metric-val{font-size:24px;font-weight:800;line-height:1.1}
.metric-lbl{font-size:12px;color:var(--text3);font-weight:700;margin-top:6px}
.metric-unit{font-size:11px;color:var(--text3);margin-top:2px}
.prev-tbl{width:100%;border-collapse:collapse;font-size:13px}
.prev-tbl th{background:var(--accent);color:#fff;padding:8px 14px;text-align:left;font-weight:700;font-size:12px}
.prev-tbl td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text)}
.prev-tbl tr:hover td{background:var(--accent-glow)}
.prev-tbl tr:last-child td{border-bottom:none}
.tbl-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px}
.chart-wrap{position:relative;width:100%;height:260px}
.chart-ttl{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-align:center}

/* COLOR PRESETS */
.color-preset { width: 20px; height: 20px; border-radius: 4px; border: 2px solid rgba(0,0,0,0.1); cursor: pointer; transition: transform .1s; }
.color-preset:hover { transform: scale(1.15); border-color: rgba(0,0,0,0.4); }

/* EDITORS */
.te-grid{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.te-grid th,.te-grid td{border:1px solid var(--border);padding:0}
.te-grid th input,.te-grid td input{width:100%;padding:6px 8px;background:transparent;border:none;outline:none;color:var(--text);font-family:'Sarabun',sans-serif;font-size:13px}
.te-grid th{background:rgba(0,70,190,.07)}
.te-grid th input{font-weight:700}
.te-ctrls{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.me-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.me-row{display:flex;gap:6px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.me-inp{background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px;outline:none;font-family:'Sarabun',sans-serif;transition:border-color .12s}
.me-inp:focus{border-color:var(--accent)}

/* EXPORT BAR */
.export-bar{padding:14px 18px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;gap:8px;align-items:center;flex-wrap:wrap;box-shadow:0 -2px 10px rgba(0,0,0,.02)}
.export-lbl{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-right:4px}

/* STATUS BAR */
#statusbar{height:var(--status-h);background:var(--accent);color:#fff;display:flex;align-items:center;padding:0 16px;gap:12px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;flex-shrink:0}
.stsp{width:1px;height:14px;background:rgba(255,255,255,.3)}
.stml{margin-left:auto;display:flex;align-items:center;gap:12px}

/* TOAST & LOADER */
#toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1.5px solid var(--border2);color:var(--text);padding:10px 24px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;z-index:9000;transition:opacity .25s,transform .25s;box-shadow:0 10px 30px rgba(0,0,0,.15);white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--success);color:var(--success)}
#toast.err{border-color:var(--danger);color:var(--danger)}

#loader-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px); flex-direction:column; gap:16px; color:#fff; font-family:'Sarabun'; font-size:16px; font-weight:700;}
#loader-overlay.show{display:flex;}
.spinner {border: 4px solid rgba(255,255,255,.3);border-top: 4px solid #fff;border-radius: 50%;width: 40px;height: 40px;animation: spin 1s linear infinite;}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* CALENDAR MODAL */
#cal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
#cal-overlay.show{display:flex}
#cal-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:18px;padding:24px;width:360px;max-width:95vw;box-shadow:0 24px 60px rgba(0,0,0,.28);animation:mIn .2s ease;user-select:none}
@keyframes mIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
#cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
#cal-myr-btn{font-size:15px;font-weight:800;color:var(--text);cursor:pointer;padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);flex:1;text-align:center;transition:background .12s;font-family:'Sarabun',sans-serif}
#cal-myr-btn:hover{background:var(--bg4)}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:grid;place-items:center;font-size:13px;transition:all .15s;flex-shrink:0}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
#cal-ym-panel{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;display:none}
#cal-ym-panel.show{display:block}
#cal-year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-yr-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;display:grid;place-items:center;font-size:11px;transition:all .12s}
.cal-yr-btn:hover{border-color:var(--accent);color:var(--accent)}
#cal-year-val{font-size:14px;font-weight:800;color:var(--text)}
#cal-month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cal-m-cell{padding:7px 2px;text-align:center;border-radius:7px;font-size:11.5px;font-weight:700;cursor:pointer;border:1.5px solid transparent;color:var(--text2);transition:all .12s}
.cal-m-cell:hover{background:rgba(0,70,190,.08);color:var(--accent)}
.cal-m-active{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
#cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-day-hdr{text-align:center;font-size:10px;font-weight:800;color:var(--text3);padding:3px 0}
.cal-day-hdr:first-child{color:#ef4444}
.cal-day-hdr:last-child{color:#3b82f6}
#cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;display:grid;place-items:center;border-radius:50%;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;border:2px solid transparent;transition:all .12s}
.cal-cell:hover{background:rgba(0,70,190,.1);color:var(--accent)}
.cal-today{border-color:var(--accent);color:var(--accent)}
.cal-selected{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.cal-other{color:var(--text3);opacity:.35;pointer-events:none}
.cal-sun{color:#ef4444}
.cal-sat{color:#3b82f6}
#cal-footer{display:flex;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.cal-foot-btn{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.cal-foot-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-cancel:hover{border-color:var(--danger)!important;color:var(--danger)!important}

@media(max-width:768px){
  main{grid-template-columns:1fr;grid-template-rows:55vh auto;height:auto}
  .panel-left{border-right:none;border-bottom:1px solid var(--border)}
  .report-paper { padding: 20px; }
}

/* ── PRINT CSS ── */
@media print{
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { height: auto; overflow: visible; background: #fff !important; padding: 0 !important; margin: 0 !important; }
  #brandbar, .panel-left, .panel-header, #statusbar, #toast, .export-bar, .add-toolbar { display: none !important; }
  main { display: block !important; height: auto !important; width: 100% !important; margin: 0 !important; overflow: visible !important; }
  .panel-right { display: block !important; width: 100% !important; overflow: visible !important; background: #fff !important; padding: 0 !important; margin: 0 !important; }
  .preview-scroll { overflow: visible !important; padding: 0 !important; background: #fff !important; margin: 0 !important; }
  .report-paper { box-shadow: none !important; border: none !important; border-radius: 0 !important; padding: 0 !important; margin: 0 auto !important; max-width: 100% !important; width: 100% !important; min-height: auto !important; }
  .prev-sec { page-break-inside: avoid; margin-bottom: 20px; }
  .chart-wrap { page-break-inside: avoid; }
}
</style>

<body>

<!-- BRAND HEADER -->
<div id="brandbar">
  <div id="brand-left" title="CNS Report Builder" onclick="window.location.href='index.html'" style="cursor:pointer;">
    <img src="Logo.png" alt="CNS Logo" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">

      <div class="brand-title">CNS : Report Builder</div>
      <div class="brand-sub">CNS Computer Co., Ltd.</div>

  </div>

<main>
  <!-- LEFT: BUILDER -->
  <div class="panel-left">
    <div class="panel-header">
      <div class="panel-label">ตัวสร้างรายงาน (ลากสลับตำแหน่งได้)</div>
      <div class="panel-actions">
        <button class="btn-sm" onclick="newReport()"><i class="fas fa-file"></i> ใหม่</button>
        <button class="btn-sm" onclick="loadSharePrompt()"><i class="fas fa-link"></i> โหลด</button>
      </div>
    </div>
    <div class="builder-scroll" id="builder-scroll">
      <div class="meta-card">
        <div class="meta-title"><i class="fas fa-file-alt"></i> ข้อมูลหน้าปกรายงาน</div>
        <div class="field-row">
          <div class="field-lbl">ชื่อรายงาน</div>
          <input class="field-inp" id="meta-title" placeholder="พิมพ์ชื่อรายงาน..." oninput="updateMeta('title',this.value)">
        </div>
        <div class="field-row">
          <div class="field-lbl">หน่วยงาน / บริษัท</div>
          <input class="field-inp" id="meta-sub" placeholder="พิมพ์ชื่อหน่วยงาน..." oninput="updateMeta('subtitle',this.value)">
        </div>
        <div class="field-row inline">
            <div style="flex:1;">
                <div class="field-lbl">วันที่</div>
                <div style="position:relative;">
                  <input class="field-inp" id="meta-date" placeholder="วว ดดดด ปปปป" oninput="updateMeta('date',this.value)" onclick="openCalendar()" style="cursor:pointer;padding-right:36px;" readonly>
                  <i class="fas fa-calendar-alt" onclick="openCalendar()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer;"></i>
                </div>
            </div>
            <div style="flex:1;">
                <div class="field-lbl">ผู้จัดทำ</div>
                <input class="field-inp" id="meta-author" placeholder="ชื่อผู้จัดทำ..." oninput="updateMeta('author',this.value)">
            </div>
        </div>
      </div>
      
      <!-- List for SortableJS -->
      <div class="section-list" id="section-list"></div>

    </div>
    <div class="add-toolbar">
      <div class="add-lbl">เพิ่มส่วนประกอบ</div>
      <div class="add-btns">
        <button class="add-btn" onclick="addSection('heading')"><i class="fas fa-heading"></i> หัวข้อ</button>
        <button class="add-btn" onclick="addSection('text')"><i class="fas fa-align-left"></i> ข้อความ</button>
        <button class="add-btn" onclick="addSection('image')"><i class="fas fa-image"></i> รูปภาพ</button>
        <button class="add-btn" onclick="addSection('list')"><i class="fas fa-list-ul"></i> รายการ</button>
        <button class="add-btn" onclick="addSection('callout')"><i class="fas fa-bullhorn"></i> เน้นย้ำ</button>
        <button class="add-btn" onclick="addSection('metric')"><i class="fas fa-tachometer-alt"></i> ตัวเลข</button>
        <button class="add-btn" onclick="addSection('table')"><i class="fas fa-table"></i> ตาราง</button>
        <button class="add-btn" onclick="addSection('chart')"><i class="fas fa-chart-bar"></i> กราฟ</button>
        <button class="add-btn" onclick="addSection('divider')"><i class="fas fa-minus"></i> เส้น</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: PREVIEW -->
  <div class="panel-right">
    <div class="panel-header">
      <div class="panel-label green">ตัวอย่างรายงาน <span id="auto-save-badge" style="display:none;margin-left:8px;color:var(--success);text-transform:none;font-size:10px;"><i class="fas fa-check-circle"></i> บันทึกล่าสุดแล้ว</span></div>
      <div class="panel-actions">
        <span id="sec-count" style="font-size:12px;color:var(--text3);font-weight:700;"></span>
      </div>
    </div>
    <div class="preview-scroll">
      <!-- กระดาษ A4 -->
      <div class="report-paper" id="report-paper"></div>
    </div>
    <div class="export-bar">
      <span class="export-lbl">ส่งออก:</span>
      <button class="btn-sm pdf-btn" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
      <button class="btn-sm success" onclick="previewReport()"><i class="fas fa-external-link-alt"></i> พรีวิวหน้าเว็บ</button>
      <button class="btn-sm" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Excel</button>
      <button class="btn-sm" onclick="exportPNG()"><i class="fas fa-image"></i> PNG</button>
      <button class="btn-sm" onclick="shareLink()"><i class="fas fa-share-alt"></i> คัดลอกลิงก์</button>
    </div>
  </div>
</main>

<div id="statusbar">
  <span id="st-sections">0 ส่วน</span>
  <div class="stsp"></div>
  <span id="st-status">พร้อมใช้งาน</span>
  <div class="stml">
    <span style="color:rgba(255,255,255,0.8);"><i class="fas fa-save"></i> Auto-save ทำงานอัตโนมัติ</span>
  </div>
</div>

<div id="toast"></div>
<div id="loader-overlay"><div class="spinner"></div><span id="loader-text">กำลังประมวลผล...</span></div>

<!-- CALENDAR POPUP -->
<div id="cal-overlay" onclick="if(event.target===this)calClose()">
  <div id="cal-box">
    <div id="cal-nav">
      <button class="cal-nav-btn" onclick="calMove(-1)"><i class="fas fa-chevron-left"></i></button>
      <button id="cal-myr-btn" onclick="calToggleYM()"></button>
      <button class="cal-nav-btn" onclick="calMove(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div id="cal-ym-panel">
      <div id="cal-year-row">
        <button class="cal-yr-btn" onclick="calMoveYear(-1)"><i class="fas fa-chevron-left"></i></button>
        <div id="cal-year-val"></div>
        <button class="cal-yr-btn" onclick="calMoveYear(1)"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div id="cal-month-grid"></div>
    </div>
    <div id="cal-days-hdr">
      <div class="cal-day-hdr">อา</div><div class="cal-day-hdr">จ</div>
      <div class="cal-day-hdr">อ</div><div class="cal-day-hdr">พ</div>
      <div class="cal-day-hdr">พฤ</div><div class="cal-day-hdr">ศ</div>
      <div class="cal-day-hdr">ส</div>

    <div id="cal-footer">
      <button class="cal-foot-btn" onclick="calToday()"><i class="fas fa-calendar-day"></i> วันนี้</button>
      <button class="cal-foot-btn cal-cancel" onclick="calClose()"><i class="fas fa-times"></i> ยกเลิก</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
var R = { title:'', subtitle:'', date:'', author:'', sections:[], nextId:1 };
var PALETTE = ['#0046be','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#0ea5e9','#14b8a6'];
var PRESET_COLORS = ['#0046be','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#0ea5e9','#14b8a6','#64748b'];
var chartInstances = {};
var activeSid = null;
var _tt = null;
var sortableInstance = null;

// ── INIT ──
function init(){
  var d = new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  R.date = d;
  document.getElementById('meta-date').value = d;
  
  if(document.documentElement.getAttribute('data-theme')==='dark'){
    document.getElementById('theme-icon').className='fas fa-sun';
  }

  // Load from Hash or LocalStorage
  if(location.hash.startsWith('#data=')){
    try{
      var dec = JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(6)))));
      Object.assign(R, dec);
      toast('โหลดรายงานจากลิงก์สำเร็จ','ok');
    }catch(e){ toast('ลิงก์ไม่ถูกต้อง','err'); }
  } else {
    var saved = localStorage.getItem('cns_report_autosave');
    if(saved){
      try{ Object.assign(R, JSON.parse(saved)); }
      catch(e){ console.error('Error loading autosave'); }
    }
  }

  document.getElementById('meta-title').value = R.title||'';
  document.getElementById('meta-sub').value = R.subtitle||'';
  document.getElementById('meta-date').value = R.date||'';
  document.getElementById('meta-author').value = R.author||'';

  renderSectionList(); renderPreview(); updateStatus();

  // Initialize SortableJS (Drag & Drop)
  var el = document.getElementById('section-list');
  sortableInstance = Sortable.create(el, {
    handle: '.drag-handle', // ลากได้เฉพาะตรงไอคอน Grip
    animation: 150,
    ghostClass: 'sortable-ghost',
    onEnd: function (evt) {
      // อัปเดต Array เมื่อมีการเรียงใหม่
      var movedItem = R.sections.splice(evt.oldIndex, 1)[0];
      R.sections.splice(evt.newIndex, 0, movedItem);
      renderPreview();
      saveLocal();
    }
  });
}

function saveLocal(){
  localStorage.setItem('cns_report_autosave', JSON.stringify(R));
  var b = document.getElementById('auto-save-badge');
  b.style.display='inline-block';
  setTimeout(function(){ b.style.display='none'; }, 2000);
}

function updateMeta(field, val){
  R[field] = val;
  renderPreview(); saveLocal();
}

// ── DEFAULTS ──
function defaultSection(type){
  var id = R.nextId++;
  if(type==='heading')  return {id:id,type:type,level:'h2',align:'left',text:'หัวข้อรายงาน'};
  if(type==='text')     return {id:id,type:type,align:'left',content:''};
  if(type==='image')    return {id:id,type:type,align:'center',url:'https://placehold.co/600x300/e2e8f0/64748b?text=Image+Placeholder',caption:'คำบรรยายภาพ'};
  if(type==='list')     return {id:id,type:type,listType:'ul',items:['หัวข้อย่อย 1','หัวข้อย่อย 2']};
  if(type==='callout')  return {id:id,type:type,cType:'info',content:'ข้อความที่ต้องการเน้นย้ำ...'};
  if(type==='divider')  return {id:id,type:type};
  if(type==='metric')   return {id:id,type:type,items:[ {label:'ยอดขาย',value:'100,000',unit:'บาท',color:'#0046be'} ]};
  if(type==='table')    return {id:id,type:type,title:'ตารางข้อมูล', headers:['รายการ','จำนวน'], rows:[['สินค้า A','50'],['สินค้า B','30']]};
  if(type==='chart')    return {id:id,type:type,chartType:'bar',title:'สถิติประจำปี', labels:['ม.ค.','ก.พ.','มี.ค.'], datasetName:'ยอดผู้ใช้งาน', data:[100,200,150], color:'#0046be'};
  return {id:id,type:type};
}

function addSection(type){
  var s = defaultSection(type);
  R.sections.push(s);
  renderSectionList(); renderPreview(); updateStatus(); saveLocal();
  activeSid = s.id;
  setTimeout(function(){
    var el = document.querySelector('.section-item[data-id="'+s.id+'"]');
    if(el){
      el.classList.add('active');
      el.querySelector('.section-editor').classList.add('show');
      el.scrollIntoView({behavior:'smooth',block:'center'});
    }
  },50);
}

function deleteSection(id){
  R.sections = R.sections.filter(function(s){ return s.id!==id; });
  if(activeSid===id) activeSid=null;
  renderSectionList(); renderPreview(); updateStatus(); saveLocal();
}

function toggleSection(id){
  var el = document.querySelector('.section-item[data-id="'+id+'"]');
  if(!el) return;
  var wasActive = el.classList.contains('active');
  document.querySelectorAll('.section-item.active').forEach(function(e){
    e.classList.remove('active');
    e.querySelector('.section-editor').classList.remove('show');
  });
  if(!wasActive){
    el.classList.add('active');
    el.querySelector('.section-editor').classList.add('show');
    activeSid = id;
  } else { activeSid = null; }
}

function getSec(id){ return R.sections.find(function(s){ return s.id===id; }); }

// ── HANDLERS ──
function onHL(id,v){ getSec(id).level=v; renderPreview(); saveLocal(); }
function onHAlign(id,v){ getSec(id).align=v; renderPreview(); saveLocal(); }
function onHT(id,v){ getSec(id).text=v; renderPreview(); updateSecName(id); saveLocal(); }
function onTC(id,v){ getSec(id).content=v; renderPreview(); updateSecName(id); saveLocal(); }
function onTAlign(id,v){ getSec(id).align=v; renderPreview(); saveLocal(); }
function onImgUrl(id,v){ getSec(id).url=v; renderPreview(); saveLocal(); }
function onImgCap(id,v){ getSec(id).caption=v; renderPreview(); saveLocal(); }
function onListType(id,v){ getSec(id).listType=v; renderPreview(); saveLocal(); }
function onCalloutType(id,v){ getSec(id).cType=v; renderPreview(); saveLocal(); }
function onMF(id,mi,f,v){ getSec(id).items[mi][f]=v; renderPreview(); refreshEditor(id); saveLocal(); }
function onTblTitle(id,v){ getSec(id).title=v; renderPreview(); updateSecName(id); saveLocal(); }
function onTblH(id,ci,v){ getSec(id).headers[ci]=v; renderPreview(); saveLocal(); }
function onTblC(id,ri,ci,v){ getSec(id).rows[ri][ci]=v; renderPreview(); saveLocal(); }
function onCType(id,v){ getSec(id).chartType=v; renderPreview(); saveLocal(); }
function onCTitle(id,v){ getSec(id).title=v; renderPreview(); updateSecName(id); saveLocal(); }
function onCLabels(id,v){ getSec(id).labels=v.split(',').map(function(s){return s.trim();}).filter(Boolean); renderPreview(); saveLocal(); }
function onCDName(id,v){ getSec(id).datasetName=v; renderPreview(); saveLocal(); }
function onCData(id,v){ getSec(id).data=v.split(',').map(function(s){return parseFloat(s.trim())||0;}); renderPreview(); saveLocal(); }
function onCColor(id,v){ getSec(id).color=v; renderPreview(); refreshEditor(id); saveLocal(); }

function execCmd(cmd, val){ document.execCommand(cmd, false, val); }

function updateSecName(id){
  var s=getSec(id);
  var el=document.querySelector('.section-item[data-id="'+id+'"] .section-name');
  if(el) el.textContent=secDisplayName(s);
}

function refreshEditor(id){
  var s=getSec(id); var ed=document.getElementById('ed-'+id);
  if(ed) ed.innerHTML=renderEditor(s);
}
// Table & List ops
function addListItem(id){ getSec(id).items.push('รายการใหม่'); refreshEditor(id); renderPreview(); saveLocal(); }
function remListItem(id,idx){ getSec(id).items.splice(idx,1); refreshEditor(id); renderPreview(); saveLocal(); }
function updateListItem(id,idx,v){ getSec(id).items[idx]=v; renderPreview(); saveLocal(); }
function insTblRow(id, ri){ var s=getSec(id); s.rows.splice(ri+1, 0, s.headers.map(function(){return '';})); refreshEditor(id); renderPreview(); saveLocal(); }
function delTblRow(id, ri){ var s=getSec(id); if(s.rows.length>1){ s.rows.splice(ri,1); refreshEditor(id); renderPreview(); saveLocal(); } }
function insTblCol(id, ci){ var s=getSec(id); s.headers.splice(ci+1, 0, 'หัวข้อใหม่'); s.rows.forEach(function(r){ r.splice(ci+1, 0, ''); }); refreshEditor(id); renderPreview(); saveLocal(); }
function delTblCol(id, ci){ var s=getSec(id); if(s.headers.length>1){ s.headers.splice(ci,1); s.rows.forEach(function(r){ r.splice(ci,1); }); refreshEditor(id); renderPreview(); saveLocal(); } }
function addMetric(id){ getSec(id).items.push({label:'รายการใหม่',value:'0',unit:'',color:'#0046be'}); refreshEditor(id); renderPreview(); saveLocal(); }
function remMetric(id,mi){ var s=getSec(id); if(s.items.length>1){s.items.splice(mi,1);refreshEditor(id);renderPreview(); saveLocal();} }

function typeLabel(t){ return {heading:'หัวข้อ',text:'ข้อความ',image:'รูปภาพ',list:'รายการ',callout:'เน้นย้ำ',metric:'ตัวเลข',table:'ตาราง',chart:'กราฟ',divider:'เส้น'}[t]||t; }
function typeIco(t){ return {heading:'',text:'g',image:'i',list:'p',callout:'o',metric:'o',table:'p',chart:'',divider:'s'}[t]||''; }
function typeIcon(t){ return {heading:'fas fa-heading',text:'fas fa-align-left',image:'fas fa-image',list:'fas fa-list-ul',callout:'fas fa-bullhorn',metric:'fas fa-tachometer-alt',table:'fas fa-table',chart:'fas fa-chart-bar',divider:'fas fa-minus'}[t]||'fas fa-file'; }
function secDisplayName(s){
  if(s.type==='heading') return s.text||'หัวข้อ';
  if(s.type==='text')    return 'ข้อความจัดรูปแบบ';
  if(s.type==='image')   return 'รูปภาพ';
  if(s.type==='list')    return s.items.length+' รายการ';
  if(s.type==='callout') return 'กล่องเน้นย้ำ';
  if(s.type==='metric')  return s.items.length+' ตัวชี้วัด';
  if(s.type==='table')   return s.title||'ตาราง';
  if(s.type==='chart')   return s.title||'กราฟ';
  if(s.type==='divider') return '— เส้นคั่น —';
  return '';
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function es(s){ return esc(s); } // for preview html generation

// ── RENDER LIST ──
function renderSectionList(){
  var list=document.getElementById('section-list');
  if(!R.sections.length){
    list.innerHTML='<div class="section-empty"><i class="fas fa-magic"></i>เริ่มสร้างรายงาน<br><span style="font-size:12px;color:var(--text3)">กดเลือกส่วนประกอบจากเมนูด้านล่าง</span></div>';
    return;
  }
  list.innerHTML=R.sections.map(function(s,idx){
    return '<div class="section-item" data-id="'+s.id+'">'
      +'<div class="section-head" onclick="toggleSection('+s.id+')">'
      +'<i class="fas fa-grip-vertical drag-handle" title="ลากเพื่อสลับตำแหน่ง"></i>'
      +'<div class="section-ico '+typeIco(s.type)+'"><i class="'+typeIcon(s.type)+'"></i></div>'
      +'<div class="section-name">'+esc(secDisplayName(s))+'</div>'
      +'<span class="section-badge">'+typeLabel(s.type)+'</span>'
      +'<div class="section-ctrls" onclick="event.stopPropagation()">'
      +'<button class="ic-btn del" onclick="deleteSection('+s.id+')" title="ลบ"><i class="fas fa-trash"></i></button>'
      +'</div></div>'
      +'<div class="section-editor" id="ed-'+s.id+'">'+renderEditor(s)+'</div>'
      +'</div>';
  }).join('');
  if(activeSid){
    var el=document.querySelector('.section-item[data-id="'+activeSid+'"]');
    if(el){ el.classList.add('active'); el.querySelector('.section-editor').classList.add('show'); }
  }
}

// ── RENDER EDITOR ──
function renderEditor(s){
  var id=s.id;
  var alignSel = '<select class="field-inp" style="width:100px" onchange="onHAlign('+id+',this.value)">'
    +'<option value="left" '+(s.align==='left'?'selected':'')+'>ชิดซ้าย</option>'
    +'<option value="center" '+(s.align==='center'?'selected':'')+'>ตรงกลาง</option>'
    +'<option value="right" '+(s.align==='right'?'selected':'')+'>ชิดขวา</option></select>';
    
  if(s.type==='divider') return '<div style="font-size:12px;color:var(--text3);text-align:center;">— เส้นคั่นไม่มีการตั้งค่าเพิ่มเติม —</div>';
  
  if(s.type==='heading') return '<div class="field-row inline"><select class="field-inp" style="width:120px" onchange="onHL('+id+',this.value)">'

// ── RENDER PREVIEW ──
function renderPreview(){
  Object.values(chartInstances).forEach(function(c){ try{c.destroy();}catch(e){} });
  chartInstances = {};
  var dark = document.documentElement.getAttribute('data-theme')==='dark';
  var tColor = dark?'#94a3b8':'#1e293b';
  var gColor = dark?'#334155':'#e2e8f0';
  
  var html = '<div class="report-paper-header">'
    +'<div><div class="rph-title">'+(esc(R.title)||'หัวข้อรายงาน (ยังไม่ได้ตั้งชื่อ)')+'</div><div class="rph-sub">'+esc(R.subtitle)+'</div></div>'
    +'<div class="rph-meta">'+(R.date?'<div>'+esc(R.date)+'</div>':'')+(R.author?'<div>'+esc(R.author)+'</div>':'')+'</div>'
    +'</div>';
    
  if(!R.sections.length){
    html+='<div style="text-align:center;padding:80px 20px;color:var(--text3)">'
      +'<div style="font-size:60px;opacity:.15;margin-bottom:20px"><i class="fas fa-file-invoice"></i></div>'
      +'<div style="font-size:16px;font-weight:700;margin-bottom:8px">รายงานว่างเปล่า</div>'
      +'<div style="font-size:14px">เพิ่มเนื้อหาจากแผงควบคุมด้านซ้าย</div></div>';
  } else {
    R.sections.forEach(function(s){ html+=renderSecPreview(s); });
  }
  
  document.getElementById('report-paper').innerHTML = html;
  
  // Render Charts
  R.sections.filter(function(s){ return s.type==='chart'; }).forEach(function(s){
    var canvas = document.getElementById('cc-'+s.id);
    if(!canvas) return;
    var isPie = s.chartType==='pie'||s.chartType==='doughnut';
    try {
      chartInstances[s.id] = new Chart(canvas, {
        type: s.chartType,
        data:{
          labels: s.labels,
          datasets:[{
            label: s.datasetName,
            data: s.data,
            backgroundColor: isPie ? PRESET_COLORS.slice(0,s.labels.length).map(function(c){return c+'dd';}) : (s.color||PALETTE[0])+'dd',
            borderColor: isPie ? PRESET_COLORS.slice(0,s.labels.length) : (s.color||PALETTE[0]),
            borderWidth:2, borderRadius:isPie?0:4, fill:false, tension:0.4
          }]
        },
        options:{
          responsive:true, maintainAspectRatio:false, animation:{duration:0}, // Disable animation for better drag & export
          plugins:{
            legend:{display:isPie,labels:{color:tColor,font:{family:'Sarabun',size:13}}},
            tooltip:{titleFont:{family:'Sarabun'},bodyFont:{family:'Sarabun'}}
          },
          scales: isPie?{}:{
            x:{ticks:{color:tColor,font:{family:'Sarabun',size:12}},grid:{color:gColor}},
            y:{ticks:{color:tColor,font:{family:'Sarabun',size:12}},grid:{color:gColor}}
          }
        }
      });
    } catch(e){ console.warn('Chart error',e); }
  });
}

function renderSecPreview(s){
  if(s.type==='heading'){ var cls={h1:'prev-h1',h2:'prev-h2',h3:'prev-h3'}[s.level]||'prev-h2'; return '<div class="prev-sec"><div class="'+cls+'" style="text-align:'+(s.align||'left')+'">'+esc(s.text)+'</div></div>'; }
  if(s.type==='text')     return '<div class="prev-sec"><div class="prev-txt" style="text-align:'+(s.align||'left')+'">'+(s.content||'')+'</div></div>';
  if(s.type==='image')    return '<div class="prev-sec prev-img-wrap" style="text-align:'+(s.align||'center')+'"><img src="'+(s.url||'https://placehold.co/600x300?text=Image+Placeholder')+'" class="prev-img" onerror="this.src=\'https://placehold.co/600x300/ffdddd/ff0000?text=Image+Not+Found\'">'+(s.caption?'<div class="prev-img-cap">'+esc(s.caption)+'</div>':'')+'</div>';
  if(s.type==='list')     return '<div class="prev-sec"><'+s.listType+' class="prev-list">'+s.items.map(function(i){return '<li>'+esc(i)+'</li>';}).join('')+'</'+s.listType+'></div>';
  if(s.type==='callout'){ 
    var icons = {info:'fa-info-circle',success:'fa-check-circle',warning:'fa-exclamation-triangle',danger:'fa-times-circle'};
    return '<div class="prev-sec"><div class="prev-callout '+(s.cType||'info')+'"><i class="fas '+icons[s.cType||'info']+'"></i><div>'+esc(s.content).replace(/\n/g,'<br>')+'</div></div></div>'; 
  }
  if(s.type==='divider')  return '<div class="prev-sec"><hr class="prev-hr"></div>';
  if(s.type==='metric')   return '<div class="prev-sec"><div class="metric-grid">'+s.items.map(function(m){ return '<div class="metric-card"><div class="metric-val" style="color:'+m.color+'">'+esc(m.value)+'</div><div class="metric-lbl">'+esc(m.label)+'</div>'+(m.unit?'<div class="metric-unit">'+esc(m.unit)+'</div>':'')+'</div>'; }).join('')+'</div></div>';
  if(s.type==='table'){
    var thead='<tr>'+s.headers.map(function(h){ return '<th>'+esc(h)+'</th>'; }).join('')+'</tr>';
    var tbody=s.rows.map(function(r){ return '<tr>'+r.map(function(c){ return '<td>'+esc(c)+'</td>'; }).join('')+'</tr>'; }).join('');
    return '<div class="prev-sec">'+(s.title?'<div class="tbl-title">'+esc(s.title)+'</div>':'')+'<div style="overflow-x:auto"><table class="prev-tbl"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div></div>';
  }
  if(s.type==='chart')    return '<div class="prev-sec">'+(s.title?'<div class="chart-ttl">'+esc(s.title)+'</div>':'')+'<div class="chart-wrap"><canvas id="cc-'+s.id+'"></canvas></div></div>';
  return '';
}

// ── GENERATE HTML CONTENT FOR WEB PREVIEW ──
function getReportHTML(){
  var sectionsHtml='';
  R.sections.forEach(function(s){
    if(s.type==='heading'){ var cls={h1:'prev-h1',h2:'prev-h2',h3:'prev-h3'}[s.level]||'prev-h2'; sectionsHtml+='<div class="prev-sec"><div class="'+cls+'" style="text-align:'+(s.align||'left')+'">'+es(s.text)+'</div></div>'; }
    else if(s.type==='text') sectionsHtml+='<div class="prev-sec"><div class="prev-txt" style="text-align:'+(s.align||'left')+'">'+(s.content||'')+'</div></div>';
    else if(s.type==='image') sectionsHtml+='<div class="prev-sec prev-img-wrap" style="text-align:'+(s.align||'center')+'"><img src="'+(s.url||'')+'" class="prev-img">'+(s.caption?'<div class="prev-img-cap">'+es(s.caption)+'</div>':'')+'</div>';
    else if(s.type==='list') sectionsHtml+='<div class="prev-sec"><'+s.listType+' class="prev-list">'+s.items.map(function(i){return '<li>'+es(i)+'</li>';}).join('')+'</'+s.listType+'></div>';
    else if(s.type==='callout'){ 
      var icons = {info:'fa-info-circle',success:'fa-check-circle',warning:'fa-exclamation-triangle',danger:'fa-times-circle'};
      sectionsHtml+='<div class="prev-sec"><div class="prev-callout '+(s.cType||'info')+'"><i class="fas '+icons[s.cType||'info']+'"></i><div>'+es(s.content).replace(/\n/g,'<br>')+'</div></div></div>'; 
    }
    else if(s.type==='divider') sectionsHtml+='<div class="prev-sec"><hr class="prev-hr"></div>';
    else if(s.type==='metric') sectionsHtml+='<div class="prev-sec"><div class="metric-grid">'+s.items.map(function(m){ return '<div class="metric-card"><div class="metric-val" style="color:'+m.color+'">'+es(m.value)+'</div><div class="metric-lbl">'+es(m.label)+'</div>'+(m.unit?'<div class="metric-unit">'+es(m.unit)+'</div>':'')+'</div>'; }).join('')+'</div></div>';
    else if(s.type==='table'){
      var thead='<tr>'+s.headers.map(function(h){ return '<th>'+es(h)+'</th>'; }).join('')+'</tr>';
      var tbody=s.rows.map(function(r){ return '<tr>'+r.map(function(c){ return '<td>'+es(c)+'</td>'; }).join('')+'</tr>'; }).join('');
      sectionsHtml+='<div class="prev-sec">'+(s.title?'<div class="tbl-title">'+es(s.title)+'</div>':'')+'<div style="overflow-x:auto"><table class="prev-tbl"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div></div>';
    }
    else if(s.type==='chart'){
      var cid='ec'+s.id;
      var isPie = s.chartType==='pie'||s.chartType==='doughnut';
      var bgC = isPie ? PRESET_COLORS.slice(0,s.labels.length).map(function(c){return c+'dd';}) : (s.color||'#0046be')+'aa';
      var boC = isPie ? PRESET_COLORS.slice(0,s.labels.length) : (s.color||'#0046be');
      var cfg=JSON.stringify({type:s.chartType,data:{labels:s.labels,datasets:[{label:s.datasetName,data:s.data,backgroundColor:bgC,borderColor:boC,borderWidth:2,fill:false,tension:0.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:isPie}}}});
      sectionsHtml+='<div class="prev-sec">'+(s.title?'<div class="chart-ttl">'+es(s.title)+'</div>':'')+'<div class="chart-wrap"><canvas id="'+cid+'"></canvas></div><script>window._c=window._c||[];window._c.push({id:"'+cid+'",cfg:'+cfg+'});<\/script></div>';
    }
  });
  
  var content='<!DOCTYPE html>\n<html lang="th">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>'+es(R.title||'รายงาน')+'</title>\n<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">\n<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:\'Sarabun\',sans-serif;background:#f3f6fc;color:#1e293b;padding:40px 20px}\n.report-paper{background:#fff;max-width:21cm;margin:0 auto;padding:50px 40px;border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,.15);border:1px solid #e2e8f0}\n.report-paper-header{border-bottom:3px solid #0046be;padding-bottom:20px;margin-bottom:30px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px}\n.rph-title{font-size:24px;font-weight:800;line-height:1.2}\n.rph-sub{font-size:15px;color:#64748b;margin-top:6px;font-weight:500}\n.rph-meta{text-align:right;font-size:13px;color:#94a3b8;line-height:1.9;flex-shrink:0}\n.prev-sec{margin-bottom:24px;page-break-inside: avoid;}\n.prev-h1{font-size:20px;font-weight:800;color:#0046be;padding-bottom:8px;border-bottom:2px solid #e2e8f0;margin-top:10px;}\n.prev-h2{font-size:16px;font-weight:700;padding-bottom:6px;border-bottom:1px solid #e2e8f0;margin-top:10px;}\n.prev-h3{font-size:14px;font-weight:700;color:#64748b}\n.prev-txt{font-size:14px;line-height:1.8;white-space:pre-wrap}\n.prev-hr{border:none;border-top:1.5px solid #e2e8f0;margin:8px 0}\n.prev-img-wrap{text-align:center;margin:16px 0}\n.prev-img{max-width:100%;height:auto;border-radius:6px;border:1px solid #e2e8f0}\n.prev-img-cap{font-size:12px;color:#94a3b8;margin-top:8px;font-style:italic}\n.prev-list{font-size:14px;line-height:1.8;padding-left:24px}\n.prev-list li{margin-bottom:6px}\n.prev-callout{padding:14px 18px;border-radius:6px;font-size:14px;line-height:1.6;display:flex;gap:14px;align-items:flex-start}\n.prev-callout i{font-size:18px;margin-top:2px}\n.prev-callout.info{background:rgba(14,165,233,.1);color:#0369a1;border:1px solid rgba(14,165,233,.2)}\n.prev-callout.success{background:rgba(16,185,129,.1);color:#047857;border:1px solid rgba(16,185,129,.2)}\n.prev-callout.warning{background:rgba(245,158,11,.1);color:#b45309;border:1px solid rgba(245,158,11,.2)}\n.prev-callout.danger{background:rgba(239,68,68,.1);color:#b91c1c;border:1px solid rgba(239,68,68,.2)}\n.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}\n.metric-card{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:16px 12px;text-align:center}\n.metric-val{font-size:24px;font-weight:800;line-height:1.1}\n.metric-lbl{font-size:12px;color:#94a3b8;font-weight:700;margin-top:6px}\n.metric-unit{font-size:11px;color:#94a3b8;margin-top:2px}\n.tbl-title{font-size:13px;font-weight:700;color:#64748b;margin-bottom:8px}\n.prev-tbl{width:100%;border-collapse:collapse;font-size:13px}\n.prev-tbl th{background:#0046be;color:#fff;padding:8px 14px;text-align:left;font-weight:700;font-size:12px}\n.prev-tbl td{padding:8px 14px;border-bottom:1px solid #e2e8f0}\n.prev-tbl tr:hover td{background:rgba(0,70,190,.03)}\n.prev-tbl tr:last-child td{border-bottom:none}\n.chart-wrap{position:relative;width:100%;height:260px}\n.chart-ttl{font-size:13px;font-weight:700;color:#64748b;margin-bottom:10px;text-align:center}\n@media print{body{padding:0;background:#fff;} .report-paper{box-shadow:none;border:none;padding:0;max-width:100%;margin:0;} *{-webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;}}\n</style>\n</head>\n<body>\n<div class="report-paper">\n<div class="report-paper-header"><div><div class="rph-title">'+es(R.title||'รายงาน')+'</div><div class="rph-sub">'+es(R.subtitle)+'</div></div><div class="rph-meta">'+(R.date?'<div>'+es(R.date)+'</div>':'')+(R.author?'<div>'+es(R.author)+'</div>':'')+'</div></div>\n'+sectionsHtml+'\n</div>\n<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>\n<script>window.addEventListener("load",function(){if(!window._c)return;window._c.forEach(function(item){var cv=document.getElementById(item.id);if(cv)new Chart(cv,item.cfg);});});<\/script>\n</body></html>';
  return content;
}

// ── PREVIEW WEB (Open in New Tab) ──
function previewReport(){
  try{
    var content = getReportHTML();
    var blob = new Blob([content], {type:'text/html;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var win = window.open(url, '_blank');
    if(win){
      toast('เปิดหน้าพรีวิวในแท็บใหม่แล้ว ✓','ok');
      setTimeout(function(){ URL.revokeObjectURL(url); }, 10000);
    } else {
      URL.revokeObjectURL(url);
      toast('เบราว์เซอร์บล็อก Pop-up กรุณาอนุญาตก่อน','err');
    }
  }catch(e){ toast('Preview ล้มเหลว: '+e.message,'err'); }
}

// ── EXPORT PDF ──
function exportPDF(){
  showLoader('กำลังสร้างไฟล์ PDF...');
  var isDark = document.documentElement.getAttribute('data-theme')==='dark';
  var element = document.getElementById('report-paper');
  
  if(isDark) { document.documentElement.setAttribute('data-theme', ''); renderPreview(); }

  var opt = {
    margin:       10,
    filename:     (R.title || 'Report_CNS') + '.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  setTimeout(function() {
    html2pdf().set(opt).from(element).save().then(function(){
      hideLoader();
      toast('ดาวน์โหลด PDF สำเร็จ ✓', 'ok');
      if(isDark) { document.documentElement.setAttribute('data-theme', 'dark'); renderPreview(); }
    }).catch(function(err){
      hideLoader();
      toast('เกิดข้อผิดพลาดในการสร้าง PDF', 'err');
      if(isDark) { document.documentElement.setAttribute('data-theme', 'dark'); renderPreview(); }
    });
  }, 500);
}

// ── EXPORT PNG ──
function exportPNG(){
  showLoader('กำลังบันทึกรูปภาพ...');
  var isDark = document.documentElement.getAttribute('data-theme')==='dark';
  var element = document.getElementById('report-paper');
  if(isDark) { document.documentElement.setAttribute('data-theme', ''); renderPreview(); }

  setTimeout(function() {
    html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(function(canvas) {
      var link = document.createElement('a');
      link.download = (R.title || 'Report') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      hideLoader();
      toast('ดาวน์โหลดรูปภาพสำเร็จ ✓', 'ok');
      if(isDark) { document.documentElement.setAttribute('data-theme', 'dark'); renderPreview(); }
    }).catch(function(){
      hideLoader();
      toast('เกิดข้อผิดพลาดในการสร้างรูปภาพ', 'err');
      if(isDark) { document.documentElement.setAttribute('data-theme', 'dark'); renderPreview(); }
    });
  }, 500);
}

// ── EXPORT EXCEL ──
function exportExcel(){
  if(typeof XLSX==='undefined'){ toast('ไม่พบไลบรารี XLSX','err'); return; }
  try{
    var wb=XLSX.utils.book_new();
    var rows=[[R.title||'รายงาน'],[R.subtitle||''],[(R.date||'')+' '+(R.author||'')],[]];
    R.sections.forEach(function(s){
      if(s.type==='heading') rows.push([s.text]);
      if(s.type==='text')    { var d = document.createElement('div'); d.innerHTML = s.content || ''; rows.push([d.textContent || ''],[]); }
      if(s.type==='image')   rows.push(['[รูปภาพ] URL: '+(s.url||'')], [s.caption||''],[]);
      if(s.type==='list')    { s.items.forEach(function(i){ rows.push(['• '+i]); }); rows.push([]); }
      if(s.type==='callout') rows.push(['['+(s.cType||'info').toUpperCase()+'] '+s.content],[]);
      if(s.type==='metric')  { rows.push(['ชื่อตัวชี้วัด','ค่า','หน่วย']); s.items.forEach(function(m){ rows.push([m.label,m.value,m.unit]); }); rows.push([]); }
      if(s.type==='table')   { if(s.title) rows.push([s.title]); rows.push(s.headers); s.rows.forEach(function(r){ rows.push(r); }); rows.push([]); }
      if(s.type==='chart')   { if(s.title) rows.push([s.title]); rows.push([s.datasetName].concat(s.labels)); rows.push(['ข้อมูล'].concat(s.data)); rows.push([]); }
    });
    var ws=XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb,ws,'รายงาน');
    XLSX.writeFile(wb,(R.title||'Report')+'.xlsx');
    toast('ดาวน์โหลด Excel สำเร็จ ✓','ok');
  }catch(e){ toast('Export Excel ล้มเหลว','err'); }
}

// ── SHARE LINK ──
function shareLink(){
  try{
    var json=JSON.stringify(R);
    if(json.length>50000){ toast('ข้อมูลใหญ่เกินไป (เกิน 50KB)','err'); return; }
    var encoded=btoa(unescape(encodeURIComponent(json)));
    var url=location.origin+location.pathname+'#data='+encoded;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){ toast('คัดลอกลิงก์สำเร็จ นำไปวางแชร์ได้เลย ✓','ok'); }).catch(function(){ prompt('คัดลอกลิงก์นี้:',url); });
    } else { prompt('คัดลอกลิงก์นี้:',url); }
  }catch(e){ toast('สร้างลิงก์ไม่ได้','err'); }
}

function loadSharePrompt(){
  var url=prompt('วางลิงก์ (Share Link) ที่นี่:');
  if(!url) return;
  try{
    var hash=url.includes('#data=')?url.split('#data=')[1]:url.trim();
    var dec=JSON.parse(decodeURIComponent(escape(atob(hash))));
    Object.assign(R,dec);
    document.getElementById('meta-title').value=R.title||'';
    document.getElementById('meta-sub').value=R.subtitle||'';
    document.getElementById('meta-date').value=R.date||'';
    document.getElementById('meta-author').value=R.author||'';
    activeSid=null; renderSectionList(); renderPreview(); updateStatus(); saveLocal();
    toast('โหลดรายงานสำเร็จ ✓','ok');
  }catch(e){ toast('ลิงก์ไม่ถูกต้องหรือเสียหาย','err'); }
}

function newReport(){
  if(R.sections.length&&!confirm('สร้างรายงานใหม่? ข้อมูลปัจจุบันจะถูกลบทั้งหมด')) return;
  R={title:'',subtitle:'',date:'',author:'',sections:[],nextId:1};
  var d=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  R.date=d;
  document.getElementById('meta-title').value='';
  document.getElementById('meta-sub').value='';
  document.getElementById('meta-date').value=d;
  document.getElementById('meta-author').value='';
  activeSid=null; 
  localStorage.removeItem('cns_report_autosave');
  renderSectionList(); renderPreview(); updateStatus();
  try{ history.replaceState(null,'',location.pathname); }catch(e){}
  toast('เริ่มสร้างรายงานใหม่','ok');
}

function toggleTheme(){
  var dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'':'dark');
  localStorage.setItem('cns_report_theme',dark?'':'dark');
  document.getElementById('theme-icon').className=dark?'fas fa-moon':'fas fa-sun';
  renderPreview(); // Rerender charts colors
}

function toast(msg,type){
  var t=document.getElementById('toast');
  t.innerHTML = (type==='ok'?'<i class="fas fa-check-circle"></i> ':'<i class="fas fa-exclamation-circle"></i> ') + msg; 
  t.className='show'+(type?' '+type:'');
  clearTimeout(_tt); _tt=setTimeout(function(){ t.className=''; },3500);
}

// ── CUSTOM CALENDAR ──
var _cY=0,_cM=0,_cYMOpen=false;
var _TH_M=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
function openCalendar(){
  var now=new Date(); _cY=now.getFullYear(); _cM=now.getMonth();
  var cur=document.getElementById('meta-date').value;
  for(var mi=0;mi<12;mi++){
    if(cur.indexOf(_TH_M[mi])>-1){
      var parts=cur.split(' '), yr=parseInt(parts[parts.length-1]);
      if(!isNaN(yr)){_cY=yr>2400?yr-543:yr; _cM=mi;} break;
    }
  }
  _cYMOpen=false;
  document.getElementById('cal-ym-panel').classList.remove('show');
  calRender();
  document.getElementById('cal-overlay').classList.add('show');
}
function calClose(){ document.getElementById('cal-overlay').classList.remove('show'); }
function calFmt(y,m,d){ return d+' '+_TH_M[m]+' '+(y+543); }
function calRender(){
  document.getElementById('cal-myr-btn').textContent=_TH_M[_cM]+' '+(_cY+543);
  document.getElementById('cal-year-val').textContent=(_cY+543)+' ('+_cY+')';
  var mg=document.getElementById('cal-month-grid'); mg.innerHTML='';
  for(var i=0;i<12;i++){
    var mc=document.createElement('div');
    mc.className='cal-m-cell'+(i===_cM?' cal-m-active':'');
    mc.textContent=_TH_M[i];
    (function(idx){mc.onclick=function(){_cM=idx;_cYMOpen=false;document.getElementById('cal-ym-panel').classList.remove('show');calRender();};})(i);
    mg.appendChild(mc);
  }
  var g=document.getElementById('cal-grid'); g.innerHTML='';
  var today=new Date(), selStr=document.getElementById('meta-date').value;
  var firstDow=new Date(_cY,_cM,1).getDay(), dim=new Date(_cY,_cM+1,0).getDate(), prevDim=new Date(_cY,_cM,0).getDate();
  for(var p=firstDow-1;p>=0;p--){var c=document.createElement('div');c.className='cal-cell cal-other';c.textContent=prevDim-p;g.appendChild(c);}
  for(var dd=1;dd<=dim;dd++){
    var c=document.createElement('div'), dow=new Date(_cY,_cM,dd).getDay(), cls='cal-cell';
    if(dow===0) cls+=' cal-sun';
    if(dow===6) cls+=' cal-sat';
    if(_cY===today.getFullYear()&&_cM===today.getMonth()&&dd===today.getDate()) cls+=' cal-today';
    if(calFmt(_cY,_cM,dd)===selStr) cls+=' cal-selected';
    c.className=cls; c.textContent=dd;
    (function(d2){c.onclick=function(){var s=calFmt(_cY,_cM,d2);document.getElementById('meta-date').value=s;updateMeta('date',s);calClose();};})(dd);
    g.appendChild(c);
  }
  var total=firstDow+dim, nxt=total%7===0?0:7-(total%7);
  for(var n=1;n<=nxt;n++){var c=document.createElement('div');c.className='cal-cell cal-other';c.textContent=n;g.appendChild(c);}
}
function calMove(dir){_cM+=dir;if(_cM<0){_cM=11;_cY--;}if(_cM>11){_cM=0;_cY++;}calRender();}
function calMoveYear(dir){_cY+=dir;calRender();}
function calToggleYM(){_cYMOpen=!_cYMOpen;document.getElementById('cal-ym-panel').classList.toggle('show',_cYMOpen);}
function calToday(){var t=new Date();_cY=t.getFullYear();_cM=t.getMonth();var s=calFmt(t.getFullYear(),t.getMonth(),t.getDate());document.getElementById('meta-date').value=s;updateMeta('date',s);calClose();}

document.addEventListener('DOMContentLoaded', init);
</script>
